<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Nelavista · TikTok style reels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #top-bar-title {
            font-weight: 600;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .right-buttons {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #admin-btn.admin-active {
            background: #4caf50;
            border-color: #4caf50;
            color: black;
        }

        .tab-bar {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            padding: 8px 16px;
            gap: 10px;
            z-index: 999;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            flex: 1;
            padding: 10px 8px;
            text-align: center;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            color: #a0a0a0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.95rem;
        }

        .tab.active {
            background: white;
            color: black;
            border-color: white;
            font-weight: 600;
        }

        #search-bar-container {
            position: fixed;
            top: 116px;
            left: 16px;
            right: 16px;
            z-index: 998;
        }

        .search-bar {
            width: 100%;
            height: 52px;
            background: #1a1a1a;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            padding: 0 16px;
            color: #aaa;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
        }

        .search-bar:hover {
            background: #252525;
            border-color: rgba(255,255,255,0.2);
        }

        .search-bar .search-icon {
            font-size: 1.2rem;
            margin-right: 12px;
            opacity: 0.7;
        }

        .search-bar .placeholder {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.7;
        }

        #reel-container {
            position: fixed;
            top: 176px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding: 0;
            background: black;
        }

        .reel-item {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reel-media {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .reel-media video,
        .reel-media iframe {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            border: none;
            pointer-events: none;
        }

        .reel-media iframe {
            pointer-events: auto;
        }

        .video-overlay-right {
            position: absolute;
            right: 12px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            z-index: 20;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .overlay-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            filter: drop-shadow(0 2px 4px black);
            transition: 0.2s;
        }

        .overlay-btn span {
            font-size: 0.9rem;
            margin-top: 4px;
            background: rgba(0,0,0,0.4);
            padding: 2px 8px;
            border-radius: 30px;
        }

        .overlay-btn.liked {
            color: #ff4d6d;
        }

        .delete-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 25;
        }

        .delete-btn {
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .video-info-bottom {
            position: absolute;
            bottom: 30px;
            left: 16px;
            right: 70px;
            z-index: 15;
            color: white;
            text-shadow: 0 1px 3px black;
        }

        .creator-name {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .caption {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-bottom: 6px;
        }

        .badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            display: inline-block;
            margin-right: 6px;
        }

        .empty-reel {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #aaa;
            font-size: 1.2rem;
            padding: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-modal {
            background: #333;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        .upload-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #2a2a2a;
            padding: 6px;
            border-radius: 40px;
        }

        .toggle-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 40px;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .toggle-option.active {
            background: white;
            color: black;
        }

        .upload-form input,
        .upload-form select,
        .upload-form textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
        }

        .upload-form input[type="file"] {
            padding: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: white;
            color: black;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: 500;
        }

        .filter-select {
            width: 100%;
            padding: 14px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            margin-bottom: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 14px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: white;
            color: black;
        }

        .btn-secondary {
            background: #333;
            color: #ccc;
            border: 1px solid #555;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <button id="back-btn" onclick="goBack()">←</button>
        <div id="top-bar-title">🎓 Nelavista Reels</div>
        <div class="right-buttons">
            <button class="icon-btn" id="upload-btn" onclick="openUploadModal()">➕</button>
            <button class="icon-btn" id="admin-btn" onclick="toggleAdmin()">🔑</button>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab active" id="tabUploaded" onclick="switchTab('uploaded')">📤 Uploaded</div>
        <div class="tab" id="tabYoutube" onclick="switchTab('youtube')">🎬 YouTube</div>
    </div>

    <div id="search-bar-container">
        <div class="search-bar" onclick="openSearchModal()">
            <span class="search-icon">🔍</span>
            <span class="placeholder">Search videos...</span>
        </div>
    </div>

    <div id="reel-container"></div>

    <div id="searchModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔍 Filter videos</h2>
                <button class="close-modal" onclick="closeSearchModal()">✕</button>
            </div>
            <div id="searchModalBody"></div>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ Create</h2>
                <button class="close-modal" onclick="closeUploadModal()">✕</button>
            </div>
            <div class="upload-toggle" id="uploadToggle">
                <div class="toggle-option active" data-type="file">📁 Video file</div>
                <div class="toggle-option" data-type="youtube">🔗 YouTube link</div>
            </div>
            <form id="uploadForm" class="upload-form" onsubmit="handleUpload(event)">
                <div id="fileUploadFields">
                    <input type="text" id="videoTitle" placeholder="Title *">
                    <select id="videoCourse">
                        <option value="">Select Course</option>
                        <option value="Biochemistry">Biochemistry</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Physics">Physics</option>
                        <option value="Mathematics">Mathematics</option>
                    </select>
                    <input type="text" id="videoLevel" placeholder="Level (e.g. 100) *">
                    <select id="videoSemester">
                        <option value="">Select Semester</option>
                        <option value="First Semester">First Semester</option>
                        <option value="Second Semester">Second Semester</option>
                    </select>
                    <input type="text" id="videoCreator" placeholder="Your name *">
                    <input type="file" id="videoFile" accept="video/*">
                    <small style="color:#aaa;">Max 100MB</small>
                </div>
                <div id="youtubeUploadFields" class="hidden">
                    <input type="text" id="ytTitle" placeholder="Title *">
                    <select id="ytCourse">
                        <option value="">Select Course</option>
                        <option value="Biochemistry">Biochemistry</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Physics">Physics</option>
                        <option value="Mathematics">Mathematics</option>
                    </select>
                    <input type="text" id="ytLevel" placeholder="Level (optional)" value="100">
                    <select id="ytSemester">
                        <option value="">Select Semester</option>
                        <option value="First Semester">First Semester</option>
                        <option value="Second Semester">Second Semester</option>
                    </select>
                    <input type="text" id="ytCreator" placeholder="Your name *">
                    <input type="url" id="ytLink" placeholder="YouTube URL *">
                    <small style="color:#aaa;">Only educational content</small>
                </div>
                <button type="submit" class="submit-btn" id="publishBtn">🚀 Publish</button>
            </form>
        </div>
    </div>

    <script>
        (function() {
            // ---------- STATE ----------
            let currentTab = 'uploaded';
            let isAdmin = false;
            let uploadedVideos = [];      // file videos from DB
            let youtubeReels = [];         // YouTube videos from DB
            let searchFilters = { course: '', level: '', semester: '' };

            // ---------- DOM elements ----------
            const reelContainer = document.getElementById('reel-container');
            const tabUploaded = document.getElementById('tabUploaded');
            const tabYoutube = document.getElementById('tabYoutube');
            const adminBtn = document.getElementById('admin-btn');
            const searchModal = document.getElementById('searchModal');
            const searchModalBody = document.getElementById('searchModalBody');
            const uploadModal = document.getElementById('uploadModal');
            const uploadToggle = document.getElementById('uploadToggle');
            const fileFields = document.getElementById('fileUploadFields');
            const youtubeFields = document.getElementById('youtubeUploadFields');
            const publishBtn = document.getElementById('publishBtn');

            let currentUploadType = 'file';

            // ---------- Helper: set required attributes ----------
            function setRequiredAttributes() {
                document.querySelectorAll('#fileUploadFields input, #fileUploadFields select, #youtubeUploadFields input, #youtubeUploadFields select').forEach(el => el.required = false);
                if (currentUploadType === 'file') {
                    fileFields.classList.remove('hidden');
                    youtubeFields.classList.add('hidden');
                    document.getElementById('videoTitle').required = true;
                    document.getElementById('videoCourse').required = true;
                    document.getElementById('videoLevel').required = true;
                    document.getElementById('videoSemester').required = true;
                    document.getElementById('videoCreator').required = true;
                    document.getElementById('videoFile').required = true;
                } else {
                    fileFields.classList.add('hidden');
                    youtubeFields.classList.remove('hidden');
                    document.getElementById('ytTitle').required = true;
                    document.getElementById('ytCourse').required = true;
                    document.getElementById('ytLevel').required = false;
                    document.getElementById('ytSemester').required = true;
                    document.getElementById('ytCreator').required = true;
                    document.getElementById('ytLink').required = true;
                }
            }

            document.querySelectorAll('.toggle-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    document.querySelectorAll('.toggle-option').forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');
                    currentUploadType = opt.dataset.type;
                    setRequiredAttributes();
                });
            });
            setRequiredAttributes();

            function formatNumber(num) {
                if (num >= 1e6) return (num/1e6).toFixed(1)+'M';
                if (num >= 1e3) return (num/1e3).toFixed(1)+'k';
                return num;
            }

            function getYouTubeEmbed(url) {
                const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
                return match ? `https://www.youtube.com/embed/${match[1]}` : url;
            }

            // ---------- Fetch videos from backend ----------
            async function fetchVideos() {
                try {
                    const response = await fetch('/api/videos', { credentials: 'include' });
                    if (!response.ok) throw new Error('Failed to fetch');
                    const videos = await response.json();
                    // Separate based on URL (simple heuristic)
                    uploadedVideos = videos.filter(v => !v.video_url.includes('youtube.com') && !v.video_url.includes('youtu.be'));
                    youtubeReels = videos.filter(v => v.video_url.includes('youtube.com') || v.video_url.includes('youtu.be'));
                    renderReel();
                } catch (err) {
                    console.error(err);
                    reelContainer.innerHTML = `<div class="empty-reel">⚠️ Could not load videos.</div>`;
                }
            }

            // ---------- Render ----------
            function renderReel() {
                let items = [];
                if (currentTab === 'uploaded') {
                    items = uploadedVideos.filter(v => {
                        if (searchFilters.course && v.course !== searchFilters.course) return false;
                        if (searchFilters.level && v.level !== searchFilters.level) return false;
                        if (searchFilters.semester && v.semester !== searchFilters.semester) return false;
                        return true;
                    });
                    if (items.length === 0) {
                        reelContainer.innerHTML = `<div class="empty-reel">📤 No uploaded videos yet. Be the first to upload.</div>`;
                        return;
                    }
                } else {
                    items = youtubeReels.filter(v => {
                        if (searchFilters.course && v.course !== searchFilters.course) return false;
                        if (searchFilters.level && v.level !== searchFilters.level) return false;
                        if (searchFilters.semester && v.semester !== searchFilters.semester) return false;
                        return true;
                    });
                    if (items.length === 0) {
                        reelContainer.innerHTML = `<div class="empty-reel">😕 No YouTube videos found</div>`;
                        return;
                    }
                }

                let html = '';
                items.forEach((item, idx) => {
                    const isUploaded = currentTab === 'uploaded';
                    const mediaUrl = isUploaded ? item.video_url : getYouTubeEmbed(item.video_url);
                    const mediaTag = isUploaded 
                        ? `<video src="${mediaUrl}" playsinline muted loop preload="metadata"></video>`
                        : `<iframe src="${mediaUrl}?enablejsapi=1&autoplay=0&mute=1" frameborder="0" allowfullscreen loading="lazy"></iframe>`;
                    
                    const deleteBtn = (isAdmin && isUploaded) ? `
                        <div class="delete-overlay">
                            <button class="delete-btn" onclick="deleteVideo('${item.id}', event)">🗑️ Delete</button>
                        </div>` : '';

                    html += `
                        <div class="reel-item" data-id="${item.id}" data-type="${currentTab}" data-index="${idx}">
                            <div class="reel-media">
                                ${mediaTag}
                            </div>
                            ${deleteBtn}
                            <div class="video-info-bottom">
                                <div class="creator-name">@${item.creator_name || item.username || 'anonymous'}</div>
                                <div class="caption">${item.caption || ''}</div>
                                <div><span class="badge">${item.course}</span> ${item.level ? '<span class="badge">L'+item.level+'</span>' : ''} ${item.semester ? '<span class="badge">'+item.semester+'</span>' : ''}</div>
                            </div>
                            <div class="video-overlay-right">
                                <button class="overlay-btn like-btn" data-id="${item.id}">
                                    ❤️ <span class="like-count">${formatNumber(item.likes || 0)}</span>
                                </button>
                                <div class="overlay-btn">
                                    👁️ <span>${formatNumber(item.views || 0)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                reelContainer.innerHTML = html;
                attachReelListeners();
                initIntersectionObserver();
            }

            // ---------- Intersection Observer ----------
            let observer;
            function initIntersectionObserver() {
                if (observer) observer.disconnect();
                observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const reel = entry.target;
                        const media = reel.querySelector('video') || reel.querySelector('iframe');
                        if (!media) return;

                        if (entry.isIntersecting) {
                            if (media.tagName === 'VIDEO') {
                                media.play().catch(() => {});
                                const id = reel.dataset.id;
                                fetch(`/api/videos/${id}/view`, { method: 'POST', credentials: 'include' })
                                    .then(res => res.json())
                                    .then(data => {
                                        const viewsSpan = reel.querySelector('.overlay-btn:last-child span');
                                        if (viewsSpan) viewsSpan.textContent = formatNumber(data.views);
                                    })
                                    .catch(err => console.error('View increment failed', err));
                            } else {
                                const src = media.src.split('?')[0];
                                media.src = `${src}?autoplay=1&mute=1&enablejsapi=1`;
                            }
                        } else {
                            if (media.tagName === 'VIDEO') {
                                media.pause();
                            } else {
                                media.src = '';
                            }
                        }
                    });
                }, { threshold: 0.7 });

                document.querySelectorAll('.reel-item').forEach(item => observer.observe(item));
            }

            // ---------- Like listener ----------
            function attachReelListeners() {
                document.querySelectorAll('.like-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        try {
                            const res = await fetch(`/api/videos/${id}/like`, { method: 'POST', credentials: 'include' });
                            const data = await res.json();
                            btn.querySelector('.like-count').textContent = formatNumber(data.likes);
                            btn.classList.add('liked');
                        } catch (err) {
                            console.error('Like failed', err);
                        }
                    });
                });
            }

            // ---------- Delete (admin) ----------
            window.deleteVideo = async function(id, e) {
                e.stopPropagation();
                if (!isAdmin) return;
                if (!confirm('Delete this video permanently?')) return;
                try {
                    const res = await fetch(`/api/videos/${id}`, { method: 'DELETE', credentials: 'include' });
                    if (res.ok) {
                        uploadedVideos = uploadedVideos.filter(v => v.id != id);
                        youtubeReels = youtubeReels.filter(v => v.id != id);
                        renderReel();
                    } else {
                        alert('Delete failed. Are you admin?');
                    }
                } catch (err) {
                    alert('Error deleting video');
                }
            };

            // ---------- Search modal ----------
            window.openSearchModal = function() {
                let html = `
                    <div class="filter-group">
                        <label>Course</label>
                        <select id="modalCourse" class="filter-select">
                            <option value="">All Courses</option>
                            <option value="Biochemistry">Biochemistry</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Physics">Physics</option>
                            <option value="Mathematics">Mathematics</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Level</label>
                        <select id="modalLevel" class="filter-select">
                            <option value="">All Levels</option>
                            <option value="100">100</option>
                            <option value="200">200</option>
                            <option value="300">300</option>
                            <option value="400">400</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Semester</label>
                        <select id="modalSemester" class="filter-select">
                            <option value="">All Semesters</option>
                            <option value="First Semester">First Semester</option>
                            <option value="Second Semester">Second Semester</option>
                        </select>
                    </div>
                    <div class="modal-actions">
                        <button class="btn-primary" id="applySearchBtn">Apply</button>
                        <button class="btn-secondary" id="resetSearchBtn">Reset</button>
                    </div>
                `;
                searchModalBody.innerHTML = html;
                searchModal.classList.add('show');

                document.getElementById('applySearchBtn').addEventListener('click', () => {
                    const course = document.getElementById('modalCourse')?.value || '';
                    const level = document.getElementById('modalLevel')?.value || '';
                    const semester = document.getElementById('modalSemester')?.value || '';
                    searchFilters = { course, level, semester };
                    renderReel();
                    closeSearchModal();
                });

                document.getElementById('resetSearchBtn')?.addEventListener('click', () => {
                    searchFilters = { course: '', level: '', semester: '' };
                    renderReel();
                    closeSearchModal();
                });
            };
            window.closeSearchModal = () => searchModal.classList.remove('show');

            // ---------- Upload modal ----------
            window.openUploadModal = () => uploadModal.classList.add('show');
            window.closeUploadModal = () => {
                uploadModal.classList.remove('show');
                document.getElementById('uploadForm').reset();
                setRequiredAttributes();
            };

            // ---------- Handle upload (improved error extraction) ----------
            window.handleUpload = async function(e) {
                e.preventDefault();
                
                if (currentUploadType === 'file') {
                    // ------------------ FILE UPLOAD to /video-upload ------------------
                    const title = document.getElementById('videoTitle').value.trim();
                    const course = document.getElementById('videoCourse').value;
                    const level = document.getElementById('videoLevel').value.trim();
                    const semester = document.getElementById('videoSemester').value;
                    const creator = document.getElementById('videoCreator').value.trim();
                    const file = document.getElementById('videoFile').files[0];

                    if (!title || !course || !level || !semester || !creator || !file) {
                        alert('Please fill all fields and select a file');
                        return;
                    }

                    const formData = new FormData();
                    formData.append('creator_name', creator);
                    formData.append('department', 'General');
                    formData.append('course', course);
                    formData.append('level', level);
                    formData.append('semester', semester);
                    formData.append('caption', title);
                    formData.append('bank_name', 'Demo Bank');
                    formData.append('account_number', '0000000000');
                    formData.append('video', file);

                    publishBtn.disabled = true;
                    publishBtn.innerHTML = '<span class="spinner"></span> Uploading...';

                    try {
                        const res = await fetch('/video-upload', {
                            method: 'POST',
                            body: formData,
                            credentials: 'include'
                        });

                        // Log the full response for debugging
                        const responseText = await res.text();
                        console.log('Upload response status:', res.status);
                        console.log('Upload response URL:', res.url);
                        console.log('Upload response text (first 500 chars):', responseText.substring(0, 500));

                        // Check if the final URL after redirects is the videos page
                        if (res.redirected && res.url.includes('/videos')) {
                            alert('✅ Video uploaded successfully!');
                            setTimeout(() => fetchVideos(), 500);
                        } else {
                            // Try to extract flash message from the HTML response
                            let errorMsg = 'Upload failed. Check console for details.';
                            // Look for common flash message patterns
                            const flashMatch = responseText.match(/<div[^>]*class=["'][^"']*flash[^"']*["'][^>]*>([\s\S]*?)<\/div>/i);
                            if (flashMatch && flashMatch[1]) {
                                // Clean HTML tags from the message
                                errorMsg = flashMatch[1].replace(/<[^>]*>/g, '').trim();
                            }
                            alert(errorMsg);
                        }
                    } catch (err) {
                        console.error('Fetch error:', err);
                        alert('Network error: ' + err.message);
                    } finally {
                        publishBtn.disabled = false;
                        publishBtn.innerHTML = '🚀 Publish';
                        closeUploadModal();
                    }
                } else {
                    // ------------------ YOUTUBE LINK UPLOAD (JSON) ------------------
                    const title = document.getElementById('ytTitle').value.trim();
                    const course = document.getElementById('ytCourse').value;
                    const level = document.getElementById('ytLevel').value.trim() || '100';
                    const semester = document.getElementById('ytSemester').value;
                    const creator = document.getElementById('ytCreator').value.trim();
                    const link = document.getElementById('ytLink').value.trim();

                    if (!title || !course || !semester || !creator || !link) {
                        alert('Please fill all required fields and enter a YouTube link');
                        return;
                    }
                    if (!link.includes('youtube.com') && !link.includes('youtu.be')) {
                        alert('Enter a valid YouTube link');
                        return;
                    }

                    const payload = {
                        creator_name: creator,
                        course: course,
                        level: level,
                        semester: semester,
                        caption: title,
                        video_url: link,
                        department: 'General',
                        bank_name: 'Demo Bank',
                        account_number: '0000000000'
                    };

                    publishBtn.disabled = true;
                    publishBtn.innerHTML = '<span class="spinner"></span> Publishing...';

                    try {
                        const res = await fetch('/api/videos/youtube', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload),
                            credentials: 'include'
                        });
                        const data = await res.json();
                        if (res.ok) {
                            alert('✅ YouTube link added!');
                            fetchVideos();
                        } else {
                            alert('Failed: ' + (data.error || 'Unknown error'));
                        }
                    } catch (err) {
                        alert('Network error: ' + err.message);
                    } finally {
                        publishBtn.disabled = false;
                        publishBtn.innerHTML = '🚀 Publish';
                        closeUploadModal();
                    }
                }
            };

            // ---------- Tab switching ----------
            window.switchTab = function(tab) {
                currentTab = tab;
                if (tab === 'uploaded') {
                    tabUploaded.classList.add('active');
                    tabYoutube.classList.remove('active');
                } else {
                    tabYoutube.classList.add('active');
                    tabUploaded.classList.remove('active');
                }
                searchFilters = { course: '', level: '', semester: '' };
                renderReel();
            };

            // ---------- Admin toggle (frontend only) ----------
            window.toggleAdmin = function() {
                if (!isAdmin) {
                    const pwd = prompt('Enter admin password:');
                    if (pwd === 'admin123') {
                        isAdmin = true;
                        adminBtn.classList.add('admin-active');
                        renderReel();
                    } else alert('Wrong');
                } else {
                    isAdmin = false;
                    adminBtn.classList.remove('admin-active');
                    renderReel();
                }
            };

            window.goBack = () => window.history.back();

            // ---------- Initial load ----------
            fetchVideos();
        })();
    </script>

        ✅ /api/videos/<id>/view (existing)
        ✅ /api/videos/youtube (existing JSON for YouTube links)
        ✅ /api/videos/<id> (DELETE – optional admin endpoint)
