<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Nelavista · Scholar Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: fixed;
        }

        /* reel container fills entire screen */
        #reel-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            background: black;
            z-index: 1;
        }

        .reel-item {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .reel-media {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        /* video fills the frame with cover (cropping to fit) */
        .reel-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
        }

        /* iframe fills the container; its content will keep its own aspect ratio (letterboxed) */
        .reel-media iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none; /* prevent accidental clicks on iframe while scrolling */
        }

        /* overlays – top bar, tab bar, search bar */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
            pointer-events: auto;
        }

        #back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        #back-btn:active { transform: scale(0.94); background: rgba(255,255,255,0.2); }

        #top-bar-title {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #fff, #ddd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .right-buttons {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .icon-btn:active { transform: scale(0.94); background: rgba(255,255,255,0.2); }
        #admin-btn.admin-active { background: #4caf50; color: black; backdrop-filter: none; }

        .tab-bar {
            position: absolute;
            top: 64px;
            left: 0;
            right: 0;
            padding: 8px 16px;
            display: flex;
            gap: 12px;
            z-index: 999;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
            pointer-events: auto;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            color: #eee;
            border: 0.5px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: 0.2s;
        }
        .tab.active {
            background: white;
            color: black;
            border-color: white;
            font-weight: 700;
        }

        #search-bar-container {
            position: absolute;
            top: 116px;
            left: 16px;
            right: 16px;
            z-index: 998;
            pointer-events: auto;
        }

        .search-bar {
            width: 100%;
            height: 48px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 0.5px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-bar:active { background: rgba(0,0,0,0.7); transform: scale(0.98); }
        .search-icon { font-size: 1.2rem; opacity: 0.8; }
        .placeholder { font-size: 0.95rem; opacity: 0.7; font-weight: 400; }

        /* right action buttons */
        .video-overlay-right {
            position: absolute;
            right: 12px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            z-index: 20;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
            pointer-events: auto;
        }

        .overlay-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.2s;
            text-shadow: 0 1px 3px black;
        }
        .overlay-btn:active { transform: scale(0.92); }
        .overlay-btn span {
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 4px;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
        .overlay-btn.liked { color: #ff3b6f; }

        /* bottom video info */
        .video-info-bottom {
            position: absolute;
            bottom: 24px;
            left: 16px;
            right: 70px;
            z-index: 15;
            color: white;
            text-shadow: 0 1px 3px black;
            pointer-events: none;
        }
        .creator-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }
        .caption {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-bottom: 6px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .badge {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            display: inline-block;
            margin-right: 6px;
            margin-top: 4px;
        }

        .delete-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 25;
            pointer-events: auto;
        }
        .delete-btn {
            background: rgba(211, 47, 47, 0.9);
            backdrop-filter: blur(8px);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 8px black;
        }

        .empty-reel {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #aaa;
            font-size: 1rem;
            padding: 24px;
            background: black;
        }

        /* modals (unchanged) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #121212;
            border-radius: 32px;
            width: 90%;
            max-width: 400px;
            padding: 24px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid #2a2a2a;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h2 { font-size: 1.6rem; background: linear-gradient(135deg, #fff, #aaa); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .close-modal {
            background: #2a2a2a;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
        .upload-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #1e1e1e;
            padding: 6px;
            border-radius: 48px;
        }
        .toggle-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 40px;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            font-weight: 500;
        }
        .toggle-option.active { background: white; color: black; }
        .upload-form input, .upload-form select, .upload-form textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 24px;
            color: white;
            font-size: 0.95rem;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: white;
            color: black;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
        }
        .filter-select {
            width: 100%;
            padding: 14px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 24px;
            color: white;
            margin-bottom: 20px;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .btn-primary {
            flex: 1;
            background: white;
            color: black;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
        }
        .btn-secondary {
            flex: 1;
            background: #2a2a2a;
            color: #ddd;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            border: 1px solid #444;
        }
        .hidden { display: none !important; }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            #top-bar { height: 56px; }
            .tab-bar { top: 56px; }
            #search-bar-container { top: 108px; }
            .video-overlay-right { right: 10px; bottom: 90px; gap: 24px; }
            .overlay-btn { font-size: 1.7rem; }
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <button id="back-btn" onclick="goBack()">←</button>
        <div id="top-bar-title">🎓 Nelavista Reels</div>
        <div class="right-buttons">
            <button class="icon-btn" id="upload-btn" onclick="openUploadModal()">➕</button>
            <button class="icon-btn" id="admin-btn" onclick="toggleAdmin()">🔑</button>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab active" id="tabUploaded" onclick="switchTab('uploaded')">📤 Uploaded</div>
        <div class="tab" id="tabYoutube" onclick="switchTab('youtube')">🎬 YouTube</div>
    </div>

    <div id="search-bar-container">
        <div class="search-bar" onclick="openSearchModal()">
            <span class="search-icon">🔍</span>
            <span class="placeholder">Search by course, level, semester...</span>
        </div>
    </div>

    <div id="reel-container"></div>

    <div id="searchModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🎯 Filter videos</h2>
                <button class="close-modal" onclick="closeSearchModal()">✕</button>
            </div>
            <div id="searchModalBody"></div>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ Create reel</h2>
                <button class="close-modal" onclick="closeUploadModal()">✕</button>
            </div>
            <div class="upload-toggle" id="uploadToggle">
                <div class="toggle-option active" data-type="file">📁 Video file</div>
                <div class="toggle-option" data-type="youtube">🔗 YouTube link</div>
            </div>
            <form id="uploadForm" class="upload-form" onsubmit="handleUpload(event)">
                <div id="fileUploadFields">
                    <input type="text" id="videoTitle" placeholder="Title *">
                    <select id="videoCourse">
                        <option value="">Select Course</option>
                        <option value="Biochemistry">Biochemistry</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Physics">Physics</option>
                        <option value="Mathematics">Mathematics</option>
                    </select>
                    <input type="text" id="videoLevel" placeholder="Level (e.g., 100) *">
                    <select id="videoSemester">
                        <option value="">Select Semester</option>
                        <option value="First Semester">First Semester</option>
                        <option value="Second Semester">Second Semester</option>
                    </select>
                    <input type="text" id="videoCreator" placeholder="Your name *">
                    <input type="file" id="videoFile" accept="video/*">
                    <small style="color:#aaa;">Max 100MB (MP4/MOV)</small>
                </div>
                <div id="youtubeUploadFields" class="hidden">
                    <input type="text" id="ytTitle" placeholder="Title *">
                    <select id="ytCourse">
                        <option value="">Select Course</option>
                        <option value="Biochemistry">Biochemistry</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Physics">Physics</option>
                        <option value="Mathematics">Mathematics</option>
                    </select>
                    <input type="text" id="ytLevel" placeholder="Level (optional)" value="100">
                    <select id="ytSemester">
                        <option value="">Select Semester</option>
                        <option value="First Semester">First Semester</option>
                        <option value="Second Semester">Second Semester</option>
                    </select>
                    <input type="text" id="ytCreator" placeholder="Your name *">
                    <input type="url" id="ytLink" placeholder="YouTube URL *">
                    <small>Educational content only</small>
                </div>
                <button type="submit" class="submit-btn" id="publishBtn">🚀 Publish</button>
            </form>
        </div>
    </div>

    <script>
        (function() {
            // ---------- STATE ----------
            let currentTab = 'uploaded';
            let isAdmin = false;
            let uploadedVideos = [];
            let youtubeReels = [];
            let searchFilters = { course: '', level: '', semester: '' };
            let currentObserver = null;

            // DOM
            const reelContainer = document.getElementById('reel-container');
            const tabUploaded = document.getElementById('tabUploaded');
            const tabYoutube = document.getElementById('tabYoutube');
            const adminBtn = document.getElementById('admin-btn');
            const searchModal = document.getElementById('searchModal');
            const searchModalBody = document.getElementById('searchModalBody');
            const uploadModal = document.getElementById('uploadModal');
            const fileFields = document.getElementById('fileUploadFields');
            const youtubeFields = document.getElementById('youtubeUploadFields');
            let currentUploadType = 'file';

            function setRequiredAttributes() {
                document.querySelectorAll('#fileUploadFields input, #fileUploadFields select, #youtubeUploadFields input, #youtubeUploadFields select').forEach(el => el.required = false);
                if (currentUploadType === 'file') {
                    fileFields.classList.remove('hidden');
                    youtubeFields.classList.add('hidden');
                    document.getElementById('videoTitle').required = true;
                    document.getElementById('videoCourse').required = true;
                    document.getElementById('videoLevel').required = true;
                    document.getElementById('videoSemester').required = true;
                    document.getElementById('videoCreator').required = true;
                    document.getElementById('videoFile').required = true;
                } else {
                    fileFields.classList.add('hidden');
                    youtubeFields.classList.remove('hidden');
                    document.getElementById('ytTitle').required = true;
                    document.getElementById('ytCourse').required = true;
                    document.getElementById('ytSemester').required = true;
                    document.getElementById('ytCreator').required = true;
                    document.getElementById('ytLink').required = true;
                    document.getElementById('ytLevel').required = false;
                }
            }

            document.querySelectorAll('.toggle-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    document.querySelectorAll('.toggle-option').forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');
                    currentUploadType = opt.dataset.type;
                    setRequiredAttributes();
                });
            });
            setRequiredAttributes();

            function formatNumber(num) {
                if (num >= 1e6) return (num/1e6).toFixed(1)+'M';
                if (num >= 1e3) return (num/1e3).toFixed(1)+'k';
                return num;
            }

            function getYouTubeEmbedUrl(url, autoplay = 0) {
                const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
                if (!match) return null;
                return `https://www.youtube.com/embed/${match[1]}?enablejsapi=1&mute=1&autoplay=${autoplay}&controls=0&modestbranding=1&rel=0&playsinline=1`;
            }

            // fetch videos
            async function fetchVideos() {
                try {
                    const res = await fetch('/api/videos', { credentials: 'include' });
                    if (!res.ok) throw new Error('fetch error');
                    const videos = await res.json();
                    uploadedVideos = videos.filter(v => !v.video_url.includes('youtube.com') && !v.video_url.includes('youtu.be'));
                    youtubeReels = videos.filter(v => v.video_url.includes('youtube.com') || v.video_url.includes('youtu.be'));
                    renderReel();
                } catch (err) {
                    console.error(err);
                    reelContainer.innerHTML = `<div class="empty-reel">⚠️ Could not load videos. Check connection.</div>`;
                }
            }

            function renderReel() {
                let items = [];
                if (currentTab === 'uploaded') {
                    items = uploadedVideos.filter(v => {
                        if (searchFilters.course && v.course !== searchFilters.course) return false;
                        if (searchFilters.level && v.level !== searchFilters.level) return false;
                        if (searchFilters.semester && v.semester !== searchFilters.semester) return false;
                        return true;
                    });
                    if (items.length === 0) {
                        reelContainer.innerHTML = `<div class="empty-reel">📤 No uploaded videos. Be the first to upload.</div>`;
                        return;
                    }
                } else {
                    items = youtubeReels.filter(v => {
                        if (searchFilters.course && v.course !== searchFilters.course) return false;
                        if (searchFilters.level && v.level !== searchFilters.level) return false;
                        if (searchFilters.semester && v.semester !== searchFilters.semester) return false;
                        return true;
                    });
                    if (items.length === 0) {
                        reelContainer.innerHTML = `<div class="empty-reel">😕 No YouTube videos found. Add some!</div>`;
                        return;
                    }
                }

                let html = '';
                items.forEach((item) => {
                    const isUploaded = currentTab === 'uploaded';
                    const mediaUrl = isUploaded ? item.video_url : getYouTubeEmbedUrl(item.video_url, 0);
                    const mediaTag = isUploaded 
                        ? `<video src="${mediaUrl}" playsinline muted loop preload="metadata"></video>`
                        : `<iframe src="${mediaUrl}" frameborder="0" allow="autoplay; fullscreen" loading="lazy"></iframe>`;
                    
                    const deleteBtn = (isAdmin && isUploaded) ? `
                        <div class="delete-overlay">
                            <button class="delete-btn" onclick="deleteVideo('${item.id}', event)">🗑️ Delete</button>
                        </div>` : '';

                    html += `
                        <div class="reel-item" data-id="${item.id}" data-type="${currentTab}" data-video-url="${isUploaded ? item.video_url : item.video_url}" data-is-yt="${!isUploaded}">
                            <div class="reel-media">
                                ${mediaTag}
                            </div>
                            ${deleteBtn}
                            <div class="video-info-bottom">
                                <div class="creator-name">@${item.creator_name || item.username || 'anonymous'}</div>
                                <div class="caption">${item.caption || ''}</div>
                                <div><span class="badge">${item.course}</span> ${item.level ? '<span class="badge">L'+item.level+'</span>' : ''} ${item.semester ? '<span class="badge">'+item.semester+'</span>' : ''}</div>
                            </div>
                            <div class="video-overlay-right">
                                <button class="overlay-btn like-btn" data-id="${item.id}">
                                    ❤️ <span class="like-count">${formatNumber(item.likes || 0)}</span>
                                </button>
                                <div class="overlay-btn">
                                    👁️ <span>${formatNumber(item.views || 0)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });

                reelContainer.innerHTML = html;
                attachReelListeners();
                initIntersectionObserver();
            }

            function initIntersectionObserver() {
                if (currentObserver) currentObserver.disconnect();
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const reel = entry.target;
                        const videoEl = reel.querySelector('video');
                        const iframeEl = reel.querySelector('iframe');
                        const id = reel.dataset.id;
                        const isYt = reel.dataset.isYt === 'true';

                        if (entry.isIntersecting) {
                            if (videoEl) {
                                videoEl.play().catch(e => console.log('autoplay blocked', e));
                                fetch(`/api/videos/${id}/view`, { method: 'POST', credentials: 'include' })
                                    .then(res => res.json())
                                    .then(data => {
                                        const viewsSpan = reel.querySelector('.overlay-btn:last-child span');
                                        if (viewsSpan) viewsSpan.textContent = formatNumber(data.views);
                                    }).catch(e => console.warn);
                            } else if (iframeEl && isYt) {
                                const originalUrl = reel.dataset.videoUrl;
                                if (originalUrl) {
                                    const newUrl = getYouTubeEmbedUrl(originalUrl, 1);
                                    if (newUrl && iframeEl.src !== newUrl) {
                                        iframeEl.src = newUrl;
                                    }
                                }
                                fetch(`/api/videos/${id}/view`, { method: 'POST', credentials: 'include' })
                                    .then(res => res.json())
                                    .then(data => {
                                        const viewsSpan = reel.querySelector('.overlay-btn:last-child span');
                                        if (viewsSpan) viewsSpan.textContent = formatNumber(data.views);
                                    }).catch(e => console.warn);
                            }
                        } else {
                            if (videoEl) videoEl.pause();
                            else if (iframeEl && isYt) {
                                const baseUrl = reel.dataset.videoUrl;
                                if (baseUrl) {
                                    const stopUrl = getYouTubeEmbedUrl(baseUrl, 0);
                                    if (stopUrl && iframeEl.src !== stopUrl) iframeEl.src = stopUrl;
                                }
                            }
                        }
                    });
                }, { threshold: 0.65 });
                
                document.querySelectorAll('.reel-item').forEach(item => observer.observe(item));
                currentObserver = observer;
            }

            function attachReelListeners() {
                document.querySelectorAll('.like-btn').forEach(btn => {
                    btn.removeEventListener('click', handleLike);
                    btn.addEventListener('click', handleLike);
                });
            }

            async function handleLike(e) {
                e.stopPropagation();
                const btn = e.currentTarget;
                const id = btn.dataset.id;
                try {
                    const res = await fetch(`/api/videos/${id}/like`, { method: 'POST', credentials: 'include' });
                    const data = await res.json();
                    const likeSpan = btn.querySelector('.like-count');
                    if (likeSpan) likeSpan.textContent = formatNumber(data.likes);
                    btn.classList.add('liked');
                } catch (err) { console.error('like error', err); }
            }

            window.deleteVideo = async function(id, e) {
                e.stopPropagation();
                if (!isAdmin) return;
                if (!confirm('Delete permanently?')) return;
                try {
                    const res = await fetch(`/api/videos/${id}`, { method: 'DELETE', credentials: 'include' });
                    if (res.ok) {
                        uploadedVideos = uploadedVideos.filter(v => v.id != id);
                        youtubeReels = youtubeReels.filter(v => v.id != id);
                        renderReel();
                    } else alert('Delete failed (admin only?)');
                } catch (err) { alert('Error deleting'); }
            };

            // Search modal
            window.openSearchModal = function() {
                searchModalBody.innerHTML = `
                    <div><label>Course</label><select id="modalCourse" class="filter-select"><option value="">All</option><option value="Biochemistry">Biochemistry</option><option value="Computer Science">Computer Science</option><option value="Physics">Physics</option><option value="Mathematics">Mathematics</option></select></div>
                    <div><label>Level</label><select id="modalLevel" class="filter-select"><option value="">All</option><option value="100">100</option><option value="200">200</option><option value="300">300</option><option value="400">400</option></select></div>
                    <div><label>Semester</label><select id="modalSemester" class="filter-select"><option value="">All</option><option value="First Semester">First Semester</option><option value="Second Semester">Second Semester</option></select></div>
                    <div class="modal-actions"><button class="btn-primary" id="applySearchBtn">Apply</button><button class="btn-secondary" id="resetSearchBtn">Reset</button></div>
                `;
                searchModal.classList.add('show');
                document.getElementById('applySearchBtn').addEventListener('click', () => {
                    searchFilters = {
                        course: document.getElementById('modalCourse').value || '',
                        level: document.getElementById('modalLevel').value || '',
                        semester: document.getElementById('modalSemester').value || ''
                    };
                    renderReel();
                    closeSearchModal();
                });
                document.getElementById('resetSearchBtn').addEventListener('click', () => {
                    searchFilters = { course: '', level: '', semester: '' };
                    renderReel();
                    closeSearchModal();
                });
            };
            window.closeSearchModal = () => searchModal.classList.remove('show');
            window.openUploadModal = () => uploadModal.classList.add('show');
            window.closeUploadModal = () => { uploadModal.classList.remove('show'); document.getElementById('uploadForm').reset(); setRequiredAttributes(); };

            window.handleUpload = async function(e) {
                e.preventDefault();
                if (currentUploadType === 'file') {
                    const title = document.getElementById('videoTitle').value.trim();
                    const course = document.getElementById('videoCourse').value;
                    const level = document.getElementById('videoLevel').value.trim();
                    const semester = document.getElementById('videoSemester').value;
                    const creator = document.getElementById('videoCreator').value.trim();
                    const file = document.getElementById('videoFile').files[0];
                    if (!title || !course || !level || !semester || !creator || !file) return alert('All fields required + video file');
                    
                    const formData = new FormData();
                    formData.append('creator_name', creator);
                    formData.append('department', 'General');
                    formData.append('course', course);
                    formData.append('level', level);
                    formData.append('semester', semester);
                    formData.append('caption', title);
                    formData.append('bank_name', 'Demo');
                    formData.append('account_number', '0000');
                    formData.append('video', file);
                    
                    const pubBtn = document.getElementById('publishBtn');
                    pubBtn.disabled = true;
                    pubBtn.innerHTML = '<span class="spinner"></span> Uploading...';
                    try {
                        const res = await fetch('/video-upload', { method: 'POST', body: formData, credentials: 'include' });
                        const text = await res.text();
                        if (res.redirected && res.url.includes('/videos')) {
                            alert('✅ Uploaded!');
                            await fetchVideos();
                        } else {
                            let errMsg = 'Upload failed.';
                            const flash = text.match(/<div[^>]*flash[^>]*>([\s\S]*?)<\/div>/i);
                            if (flash) errMsg = flash[1].replace(/<[^>]*>/g, '').trim();
                            alert(errMsg);
                        }
                    } catch (err) { alert('Network error: ' + err.message); }
                    finally { pubBtn.disabled = false; pubBtn.innerHTML = '🚀 Publish'; closeUploadModal(); }
                } 
                else { // youtube
                    const title = document.getElementById('ytTitle').value.trim();
                    const course = document.getElementById('ytCourse').value;
                    const level = document.getElementById('ytLevel').value.trim() || '100';
                    const semester = document.getElementById('ytSemester').value;
                    const creator = document.getElementById('ytCreator').value.trim();
                    const link = document.getElementById('ytLink').value.trim();
                    if (!title || !course || !semester || !creator || !link) return alert('Fill required fields');
                    if (!link.includes('youtube.com') && !link.includes('youtu.be')) return alert('Valid YouTube link required');
                    
                    const pubBtn = document.getElementById('publishBtn');
                    pubBtn.disabled = true;
                    pubBtn.innerHTML = '<span class="spinner"></span> Publishing...';
                    try {
                        const res = await fetch('/api/videos/youtube', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ creator_name: creator, course, level, semester, caption: title, video_url: link, department: 'General', bank_name: 'Demo', account_number: '0000' }),
                            credentials: 'include'
                        });
                        if (res.ok) { alert('YouTube link added!'); fetchVideos(); }
                        else { const err = await res.json(); alert(err.error || 'Failed'); }
                    } catch (err) { alert('Network error: ' + err.message); }
                    finally { pubBtn.disabled = false; pubBtn.innerHTML = '🚀 Publish'; closeUploadModal(); }
                }
            };

            window.switchTab = function(tab) {
                currentTab = tab;
                if (tab === 'uploaded') { tabUploaded.classList.add('active'); tabYoutube.classList.remove('active'); }
                else { tabYoutube.classList.add('active'); tabUploaded.classList.remove('active'); }
                searchFilters = { course: '', level: '', semester: '' };
                renderReel();
            };

            window.toggleAdmin = function() {
                if (!isAdmin) {
                    const pwd = prompt('Admin password:');
                    if (pwd === 'admin123') { isAdmin = true; adminBtn.classList.add('admin-active'); renderReel(); }
                    else alert('Wrong');
                } else { isAdmin = false; adminBtn.classList.remove('admin-active'); renderReel(); }
            };
            window.goBack = () => window.history.back();

            fetchVideos();
        })();
    </script>
</body>
</html>
